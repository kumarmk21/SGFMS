<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" fill="none">
  <!-- Oval disc -->
  <ellipse cx="160" cy="38" rx="90" ry="28" fill="white" transform="rotate(-5 160 38)"/>

  <!-- Stylised double-S lightning bolt inside the oval -->
  <g transform="translate(160,38) rotate(-5)" fill="#CC0000">
    <!-- Left S curve -->
    <path d="M-28,-10 C-28,-18 -18,-22 -10,-18 C-2,-14 2,-6 10,-2
             C18,2 22,8 16,14 C10,20 0,18 -6,12" stroke="#CC0000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Right S curve -->
    <path d="M-8,-14 C-2,-20 8,-20 14,-14 C20,-8 22,0 16,6
             C10,12 2,14 8,20 C14,26 24,24 28,18" stroke="#CC0000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- "Scorpion" script text -->
  <text
    x="160" y="95"
    text-anchor="middle"
    fill="white"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-style="italic"
    font-weight="700"
    letter-spacing="1"
  >Scorpion</text>

  <!-- Registered trademark -->
  <text
    x="282" y="78"
    fill="white"
    font-family="Arial, sans-serif"
    font-size="14"
    font-weight="400"
  >®</text>
</svg>
